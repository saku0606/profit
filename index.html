<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利益計算</title>
  <link rel="stylesheet" href="styles.css">
<!-- favicon generated by favi/main.py start -->
<link rel="icon" href="./favicon.png" type="image/png">
<link rel="shortcut icon" href="./favicon.png" type="image/png">
<!-- favicon generated by favi/main.py end -->
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">¥</span>
        <span class="brand-name">利益計算</span>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="hero">
    </div>

    <section id="profitToPriceScreen" aria-label="利益から販売価格を計算">
      <div class="tool-panel">
        <div class="tabs">
          <span class="tab is-active">利益から計算</span>
          <button class="tab" type="button" data-target="priceToProfitScreen">販売価格から計算</button>
        </div>

        <div class="tool-body">
          <div class="field">
            <label for="targetProfit">欲しい利益</label>
            <div class="text-input">
              <input id="targetProfit" type="text" inputmode="numeric" autocomplete="off" placeholder="500">
              <button id="clearInput" class="clear-button" type="button" aria-label="入力を消す" hidden>×</button>
              <span class="unit" aria-hidden="true">円</span>
            </div>
          </div>

          <div class="field">
            <label for="shippingMethod">発送方法</label>
            <select id="shippingMethod">
              <optgroup label="ゆうゆうメルカリ便">
                <option value="160" selected>ゆうパケットポストmini - 160円</option>
                <option value="215">ゆうパケットポスト - 215円</option>
                <option value="230">ゆうパケット - 230円</option>
                <option value="455">ゆうパケットプラス - 455円</option>
                <option value="750">ゆうパック 60サイズ - 750円</option>
                <option value="870">ゆうパック 80サイズ - 870円</option>
                <option value="1070">ゆうパック 100サイズ - 1,070円</option>
                <option value="1200">ゆうパック 120サイズ - 1,200円</option>
                <option value="1450">ゆうパック 140サイズ - 1,450円</option>
                <option value="1700">ゆうパック 160サイズ - 1,700円</option>
                <option value="1900">ゆうパック 170サイズ - 1,900円</option>
              </optgroup>
              <optgroup label="らくらくメルカリ便">
                <option value="210">ネコポス - 210円</option>
                <option value="450">宅急便コンパクト - 450円</option>
                <option value="750">宅急便 60サイズ - 750円</option>
                <option value="850">宅急便 80サイズ - 850円</option>
                <option value="1050">宅急便 100サイズ - 1,050円</option>
                <option value="1200">宅急便 120サイズ - 1,200円</option>
                <option value="1450">宅急便 140サイズ - 1,450円</option>
                <option value="1700">宅急便 160サイズ - 1,700円</option>
                <option value="2100">宅急便 180サイズ - 2,100円</option>
                <option value="2500">宅急便 200サイズ - 2,500円</option>
              </optgroup>
            </select>
          </div>

          <div class="result-card" aria-live="polite">
            <div class="result-main">
              <span>この価格で出品</span>
              <strong id="salePrice" class="value-price">--円</strong>
            </div>
            <dl class="result-details">
              <div>
                <dt>販売手数料（10%）</dt>
                <dd id="feeAmount">--円</dd>
              </div>
              <div>
                <dt>送料</dt>
                <dd id="shippingAmount">160円</dd>
              </div>
              <div>
                <dt>手元に残る利益</dt>
                <dd id="actualProfit">--円</dd>
              </div>
            </dl>
          </div>

          <p class="note">※ 送料はメルカリ便の料金表をもとにした概算です。販売手数料は1円未満を切り捨てて計算しています。</p>
        </div>
      </div>
    </section>

    <section id="priceToProfitScreen" aria-label="販売価格から利益を計算" hidden>
      <div class="tool-panel">
        <div class="tabs">
          <button class="tab" type="button" data-target="profitToPriceScreen">利益から計算</button>
          <span class="tab is-active">販売価格から計算</span>
        </div>

        <div class="tool-body">
          <div class="field">
            <label for="salePriceInput">販売価格</label>
            <div class="text-input">
              <input id="salePriceInput" type="text" inputmode="numeric" autocomplete="off" placeholder="1000">
              <button id="clearInputB" class="clear-button" type="button" aria-label="入力を消す" hidden>×</button>
              <span class="unit" aria-hidden="true">円</span>
            </div>
          </div>

          <div class="field">
            <label for="shippingMethodB">発送方法</label>
            <select id="shippingMethodB">
              <optgroup label="ゆうゆうメルカリ便">
                <option value="160" selected>ゆうパケットポストmini - 160円</option>
                <option value="215">ゆうパケットポスト - 215円</option>
                <option value="230">ゆうパケット - 230円</option>
                <option value="455">ゆうパケットプラス - 455円</option>
                <option value="750">ゆうパック 60サイズ - 750円</option>
                <option value="870">ゆうパック 80サイズ - 870円</option>
                <option value="1070">ゆうパック 100サイズ - 1,070円</option>
                <option value="1200">ゆうパック 120サイズ - 1,200円</option>
                <option value="1450">ゆうパック 140サイズ - 1,450円</option>
                <option value="1700">ゆうパック 160サイズ - 1,700円</option>
                <option value="1900">ゆうパック 170サイズ - 1,900円</option>
              </optgroup>
              <optgroup label="らくらくメルカリ便">
                <option value="210">ネコポス - 210円</option>
                <option value="450">宅急便コンパクト - 450円</option>
                <option value="750">宅急便 60サイズ - 750円</option>
                <option value="850">宅急便 80サイズ - 850円</option>
                <option value="1050">宅急便 100サイズ - 1,050円</option>
                <option value="1200">宅急便 120サイズ - 1,200円</option>
                <option value="1450">宅急便 140サイズ - 1,450円</option>
                <option value="1700">宅急便 160サイズ - 1,700円</option>
                <option value="2100">宅急便 180サイズ - 2,100円</option>
                <option value="2500">宅急便 200サイズ - 2,500円</option>
              </optgroup>
            </select>
          </div>

          <div id="profitResultArea" class="result-card" aria-live="polite">
            <div class="result-main">
              <span id="profitResultLabel">手元に残る利益</span>
              <strong id="profitResult" class="value-profit">--円</strong>
            </div>
            <dl class="result-details">
              <div>
                <dt>販売手数料（10%）</dt>
                <dd id="feeAmountB">--円</dd>
              </div>
              <div>
                <dt>送料</dt>
                <dd id="shippingAmountB">160円</dd>
              </div>
            </dl>
          </div>

          <p class="note">※ 送料はメルカリ便の料金表をもとにした概算です。販売手数料は1円未満を切り捨てて計算しています。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>本ツールの計算結果は目安です。実際の手数料・送料は各サービスの最新情報をご確認ください。</p>
    <small>© 2026 利益計算</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
