<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利益計算</title>
  <link rel="stylesheet" href="styles.css">
<!-- favicon generated by favi/main.py start -->
<link rel="icon" href="./favicon.png" type="image/png">
<link rel="shortcut icon" href="./favicon.png" type="image/png">
<!-- favicon generated by favi/main.py end -->
</head>
<body>
  <main class="page-shell">
    <section class="calculator" aria-labelledby="appTitle">
      <div class="title-group">
        <div class="app-mark" aria-hidden="true">¥</div>
        <div>
          <p class="eyebrow">Profit</p>
          <h1 id="appTitle">利益計算</h1>
        </div>
      </div>

      <label class="input-field" for="targetProfit">
        <span>利益</span>
        <div class="yen-input">
          <span aria-hidden="true">¥</span>
          <input id="targetProfit" type="text" inputmode="numeric" autocomplete="off" placeholder="400">
          <button id="clearInput" class="clear-button" type="button" aria-label="入力を消す" hidden>×</button>
        </div>
      </label>

      <label class="input-field" for="shippingMethod">
        <span>発送方法</span>
        <select id="shippingMethod" class="shipping-select">
          <optgroup label="ゆうゆうメルカリ便">
            <option value="160" selected>ゆうパケットポストmini - 160円</option>
            <option value="215">ゆうパケットポスト - 215円</option>
            <option value="230">ゆうパケット - 230円</option>
            <option value="455">ゆうパケットプラス - 455円</option>
            <option value="750">ゆうパック 60サイズ - 750円</option>
            <option value="870">ゆうパック 80サイズ - 870円</option>
            <option value="1070">ゆうパック 100サイズ - 1,070円</option>
            <option value="1200">ゆうパック 120サイズ - 1,200円</option>
            <option value="1450">ゆうパック 140サイズ - 1,450円</option>
            <option value="1700">ゆうパック 160サイズ - 1,700円</option>
            <option value="1900">ゆうパック 170サイズ - 1,900円</option>
          </optgroup>
          <optgroup label="らくらくメルカリ便">
            <option value="210">ネコポス - 210円</option>
            <option value="450">宅急便コンパクト - 450円</option>
            <option value="750">宅急便 60サイズ - 750円</option>
            <option value="850">宅急便 80サイズ - 850円</option>
            <option value="1050">宅急便 100サイズ - 1,050円</option>
            <option value="1200">宅急便 120サイズ - 1,200円</option>
            <option value="1450">宅急便 140サイズ - 1,450円</option>
            <option value="1700">宅急便 160サイズ - 1,700円</option>
            <option value="2100">宅急便 180サイズ - 2,100円</option>
            <option value="2500">宅急便 200サイズ - 2,500円</option>
          </optgroup>
        </select>
      </label>

      <div class="result-area" aria-live="polite">
        <span>販売価格</span>
        <strong id="salePrice">--円</strong>
      </div>

      <dl class="breakdown">
        <div>
          <dt>販売手数料 10%</dt>
          <dd id="feeAmount">--円</dd>
        </div>
        <div>
          <dt>送料</dt>
          <dd id="shippingAmount">160円</dd>
        </div>
        <div>
          <dt>残る利益</dt>
          <dd id="actualProfit">--円</dd>
        </div>
      </dl>

      <p class="note">送料はPDFの早わかり表をもとにしています。販売手数料は1円未満を切り捨てて計算しています。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
